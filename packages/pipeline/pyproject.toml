[project]
name = "aeon-reader-pipeline"
version = "0.1.0"
description = "Content compiler pipeline for Aeon Trespass rulebook translation"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10,<3",
    "orjson>=3.10,<4",
    "pyyaml>=6.0,<7",
    "typer>=0.15,<1",
    "pymupdf>=1.25,<2",
    "jinja2>=3.1,<4",
    "structlog>=24.0,<26",
    "google-genai>=1.0,<2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0,<9",
    "mypy>=1.14,<2",
    "ruff>=0.9,<1",
    "types-PyYAML",
]

[project.scripts]
reader-pipeline = "aeon_reader_pipeline.cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aeon_reader_pipeline"]
