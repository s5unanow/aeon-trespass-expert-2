# CI workflow — runs on all PRs and pushes to main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check packages/pipeline/src tests/backend
      - run: uv run ruff format --check packages/pipeline/src tests/backend
      - run: uv run mypy --strict packages/pipeline/src
      - run: uv run lint-imports
      - name: Security lint (bandit)
        run: uv run bandit -c pyproject.toml -r packages/pipeline/src
        continue-on-error: true
      - run: uv run pytest tests/backend --cov-report=html:coverage-html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage-html/

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: uv sync
      - run: pnpm install
      - run: make check-generated

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm --filter reader lint
      - run: pnpm -r run typecheck
      - run: pnpm --filter reader test -- --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: apps/reader/coverage/
      - run: pnpm --filter reader build

  operator-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install
      - name: Sync fixture bundles
        run: |
          rm -rf apps/reader/generated
          mkdir -p apps/reader/generated
          cp -r tests/fixtures/site-bundles/* apps/reader/generated/
      - name: Build static site
        run: make site-build
      - name: Build search index
        run: make build-search
      - name: Verify site output
        run: |
          test -d apps/reader/out || (echo "FAIL: out/ directory missing" && exit 1)
          test -f apps/reader/out/index.html || (echo "FAIL: index.html missing" && exit 1)
      - name: Verify search index
        run: |
          test -d apps/reader/out/pagefind || (echo "FAIL: pagefind/ directory missing" && exit 1)
          test -f apps/reader/out/pagefind/pagefind.js || (echo "FAIL: pagefind.js missing" && exit 1)

  e2e:
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install
      - name: Install fixture bundle for E2E
        run: |
          rm -rf apps/reader/generated
          mkdir -p apps/reader/generated
          cp -r tests/fixtures/site-bundles/* apps/reader/generated/
      - name: Install fixture assets for E2E
        run: |
          for dir in tests/fixtures/site-bundles/*/assets; do
            if [ -d "$dir" ]; then
              doc_id=$(basename "$(dirname "$dir")")
              mkdir -p "apps/reader/public/assets/$doc_id"
              cp -r "$dir"/* "apps/reader/public/assets/$doc_id/"
            fi
          done
      - run: pnpm --filter reader build
      - run: npx playwright install --with-deps chromium
      - run: pnpm --filter reader test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/reader/playwright-report/
