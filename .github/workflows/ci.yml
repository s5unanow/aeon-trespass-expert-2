# CI workflow — runs on all PRs and pushes to main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check packages/pipeline/src tests/backend
      - run: uv run ruff format --check packages/pipeline/src tests/backend
      - run: uv run mypy --strict packages/pipeline/src
      - name: Security lint (bandit)
        run: uv run bandit -c pyproject.toml -r packages/pipeline/src
        continue-on-error: true
      - run: uv run pytest tests/backend --cov-report=html:coverage-html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage-html/

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: uv sync
      - run: pnpm install
      - run: make check-generated

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm --filter reader lint
      - run: pnpm -r run typecheck
      - run: pnpm --filter reader test
      - run: pnpm --filter reader build

  e2e:
    needs: frontend
    runs-on: ubuntu-latest
    # E2E requires generated bundle data for static export.
    # Runs only when generated/ contains document directories.
    if: false  # Enable when CI has generated bundle data
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm --filter reader build
      - run: npx playwright install --with-deps chromium
      - run: pnpm --filter reader test:e2e
