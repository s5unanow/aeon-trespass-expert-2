# Preview workflow — builds the reader on PRs and uploads as artifact.
name: Preview

on:
  pull_request:
    branches: [main]

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install
      - name: Install fixture bundle
        run: |
          rm -rf apps/reader/generated
          mkdir -p apps/reader/generated
          cp -r tests/fixtures/site-bundles/* apps/reader/generated/
      - run: pnpm --filter reader build
      - uses: actions/upload-artifact@v4
        with:
          name: reader-preview
          path: apps/reader/out/
          retention-days: 7
